workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    
    integrations:
      app_store_connect: vivi  # TODO: 改成你的 App Store Connect 集成名称
    
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ViVi.lgdzydyg # TODO: 改成你的 Bundle ID
      vars:
        BUNDLE_ID: "com.ViVi.lgdzydyg"  # TODO: 与上面保持一致
      xcode: latest
      cocoapods: default
    
    scripts:
      - name: Set project settings
        script: |
          XCODE_WORKSPACE="lgdz.xcworkspace"
          XCODE_SCHEME="lgdz"
          echo "XCODE_WORKSPACE=$XCODE_WORKSPACE" >> $CM_ENV
          echo "XCODE_SCHEME=$XCODE_SCHEME" >> $CM_ENV
          echo "Workspace: $XCODE_WORKSPACE"
          echo "Scheme: $XCODE_SCHEME"
      
      - name: Install CocoaPods dependencies
        script: |
          if [ -f "Podfile" ]; then
            pod install
          else
            echo "No Podfile found, skipping CocoaPods"
          fi
      
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR
          
          # 方案1: 尝试从 TestFlight 获取最新版本号
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>&1) || true
          echo "TestFlight API returned: $LATEST_BUILD_NUMBER"
          
          if [[ "$LATEST_BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            NEW_BUILD_NUMBER=$((LATEST_BUILD_NUMBER + 1))
            echo "Using TestFlight build number + 1"
          # 方案2: 使用 Codemagic 内置构建号
          elif [[ -n "$BUILD_NUMBER" && "$BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            NEW_BUILD_NUMBER=$BUILD_NUMBER
            echo "Using Codemagic BUILD_NUMBER"
          # 方案3: 保底使用短时间戳（日时分，6位数字）
          else
            NEW_BUILD_NUMBER=$(date +%d%H%M)
            echo "Fallback to short timestamp (DDHHMM)"
          fi
          
          echo "Setting build number to: $NEW_BUILD_NUMBER"
          agvtool new-version -all $NEW_BUILD_NUMBER
      
      - name: Build ipa for distribution
        script: |
          if [ -n "$XCODE_WORKSPACE" ]; then
            xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
          else
            xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME"
          fi
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    
    publishing:
      email:
        recipients:
          - 2082953467@qq.com  # TODO: 接收codemagic处理消息的邮箱
        notify:
          success: true
          failure: true
      
      app_store_connect:
        auth: integration
        submit_to_testflight: true
